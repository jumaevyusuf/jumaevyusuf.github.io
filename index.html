<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TerDPI - Ilmiy bo‘lim</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2d3d;
    }
    .hero {
      background: linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
        url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=1400&q=80') center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 20px;
    }
    .box {
      max-width: 900px;
      background: rgba(0,0,0,.25);
      padding: 40px;
      border-radius: 20px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }
    p {
      font-size: 22px;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      background: #0f6cbd;
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 18px;
    }
    .btn:hover {
      background: #0b5aa0;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="box">
      <h1>TerDPI - Ilmiy bo‘lim</h1>
      <p>Ilmiy tadqiqotlar, innovatsiyalar va ilmiy pedagogik kadrlar tayyorlash bo‘limining rasmiy sahifasi</p>
      <a class="btn" href="#">Ariza yuborish</a>
    </div>
  </section>
</body>
</html>
